name: Deploy to App Service

on:
  workflow_run:
    workflows: ["App Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: app-umair-lab
  RESOURCE_GROUP: rg-umair-appservice-lab
  ACR_IMAGE: umairlabacr.azurecr.io/myapp:latest
  STAGING_SLOT: staging

jobs:
  deploy:
    name: Deploy → Staging → Swap
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container image to staging slot
        run: |
          az webapp config container set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --slot ${{ env.STAGING_SLOT }} \
            --docker-custom-image-name ${{ env.ACR_IMAGE }} \
            --docker-registry-server-url https://umairlabacr.azurecr.io

      - name: Restart staging slot
        run: |
          az webapp restart \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --slot ${{ env.STAGING_SLOT }}

      - name: Wait for staging slot to be ready
        run: |
          echo "Waiting 60s for container to pull and initialize..."
          sleep 60

      - name: Health check staging slot
        run: |
          STAGING_URL=$(az webapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --slot ${{ env.STAGING_SLOT }} \
            --query defaultHostName -o tsv)
          echo "Checking https://$STAGING_URL"
          curl --fail --retry 5 --retry-delay 10 --retry-all-errors \
            -o /dev/null -s -w "HTTP %{http_code}\n" \
            https://$STAGING_URL

      - name: Swap staging → production
        run: |
          az webapp deployment slot swap \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --slot ${{ env.STAGING_SLOT }} \
            --target-slot production

      - name: Confirm production is healthy
        run: |
          PROD_URL=$(az webapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query defaultHostName -o tsv)
          echo "Production: https://$PROD_URL"
          curl --fail --retry 3 --retry-delay 5 \
            -o /dev/null -s -w "HTTP %{http_code}\n" \
            https://$PROD_URL
