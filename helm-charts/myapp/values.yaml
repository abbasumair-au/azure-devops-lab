# Default values for myapp.
replicaCount: 1

image:
  repository: umairlabacr.azurecr.io/myapp
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 5000

containerPort: 5000

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
