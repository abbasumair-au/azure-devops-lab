apiVersion: v1
kind: Pod
metadata:
  name: kv-reader
  namespace: workload-identity-demo
  labels:
    azure.workload.identity/use: "true"
spec:
  serviceAccountName: kv-reader-sa
  containers:
    - name: kv-reader
      image: python:3.11-slim
      command: ["/bin/sh", "-c"]
      args:
        - |
          pip install azure-identity azure-keyvault-secrets --quiet
          python3 << 'PYEOF'
          import os
          from azure.identity import WorkloadIdentityCredential
          from azure.keyvault.secrets import SecretClient

          # No credentials in code — token injected by AKS Workload Identity webhook
          credential = WorkloadIdentityCredential()
          client = SecretClient(vault_url=os.environ["KEY_VAULT_URI"], credential=credential)

          secret = client.get_secret("lab-demo-secret")
          print(f"[OK] Secret value: {secret.value!r}")
          print("[OK] Workload Identity is working — zero credentials in this pod!")
          PYEOF
          sleep infinity
      env:
        - name: KEY_VAULT_URI
          value: "${KEY_VAULT_URI}"
  restartPolicy: Never
